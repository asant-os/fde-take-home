services:
  risk-alert-service:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.docker
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/secrets/gcp.json:ro
      - ${PARQUET_PATH}:/data/monthly_account_status.parquet:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"